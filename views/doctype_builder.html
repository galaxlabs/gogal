{{ define "doctype_builder.html" }}
<section class="builder-page" data-doctype-json='{{ .doctype_json }}'>
  <div class="page-header">
    <div><h2>DocType Builder</h2><p class="muted">Create and edit DocTypes with field rows.</p></div>
    <button id="doctype-save-btn" class="btn btn-primary">Save DocType</button>
  </div>

  {{ if .error }}<div class="alert alert-error">{{ .error }}</div>{{ end }}

  <div class="builder-grid">
    <div class="card">
      <label>Name <input id="dt-name" placeholder="Customer" /></label>
      <label>Label <input id="dt-label" placeholder="Customer" /></label>
      <label>Module <input id="dt-module" value="Core" /></label>
      <label>Table Name <input id="dt-table" placeholder="tab_customer" /></label>
      <label>Description <textarea id="dt-description" rows="2"></textarea></label>
      <div class="inline-checks">
        <label><input type="checkbox" id="dt-single" /> Is Single</label>
        <label><input type="checkbox" id="dt-child" /> Is Child Table</label>
      </div>
    </div>

    <div class="card">
      <div class="page-header compact">
        <h3>Fields</h3>
        <button id="add-field-btn" class="btn">Add Field</button>
      </div>
      <div id="field-rows" class="field-rows"></div>
      <small class="muted">Drag rows to reorder.</small>
    </div>

    <div class="card">
      <h3>Result</h3>
      <pre id="doctype-preview" class="json-box"></pre>
      <div id="doctype-save-result"></div>
    </div>
  </div>
</section>
{{ end }}
