{{ define "layout.html" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .title }}</title>
  <link rel="stylesheet" href="/public/css/app.css" />
  <script src="/public/js/htmx.min.js"></script>
  <script>
    if (typeof window.htmx === 'undefined') {
      var s = document.createElement('script'); s.src='https://unpkg.com/htmx.org@1.9.12'; document.head.appendChild(s);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/public/js/sortable.min.js"></script>
  <script src="/public/js/studio.js" defer></script>
</head>
<body>
  <div class="desk-shell">
    {{ template "partials/sidebar.html" . }}
    <div class="desk-main">
      {{ template "partials/topbar.html" . }}
      <main id="app-content" class="desk-content" hx-get="{{ if .start_path }}{{ .start_path }}{{ else }}/desk/dashboard{{ end }}" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
        <div class="card">Loading Gogal Desk...</div>
      </main>
    </div>
  </div>
</body>
</html>
{{ end }}
