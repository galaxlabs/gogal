{{ define "layout.html" }}
<!doctype html>
<html lang="en" class="h-full bg-slate-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
      [x-cloak] { display: none !important; }
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { display: inline-flex; }
    </style>
  </head>
  <body class="h-full text-slate-900 antialiased">
    <div class="flex min-h-screen bg-slate-100">
      <aside class="hidden w-72 shrink-0 border-r border-slate-200 bg-slate-950 text-slate-100 lg:flex lg:flex-col">
        <div class="border-b border-white/10 px-6 py-5">
          <p class="text-xs font-semibold uppercase tracking-[0.3em] text-sky-300">Gogal Studio</p>
          <h1 class="mt-2 text-xl font-semibold text-white">Desk</h1>
          <p class="mt-2 text-sm leading-6 text-slate-400">Go templates + HTMX + vanilla JavaScript.</p>
        </div>
        <nav class="flex-1 space-y-2 px-4 py-5">
          <button
            class="flex w-full items-center rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-200 transition hover:bg-white/5"
            hx-get="/desk/dashboard"
            hx-target="#app-content"
            hx-swap="innerHTML"
          >
            Dashboard
          </button>
          <button
            class="flex w-full items-center rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-200 transition hover:bg-white/5"
            hx-get="/desk/doctype-builder"
            hx-target="#app-content"
            hx-swap="innerHTML"
          >
            DocTypes
          </button>
        </nav>
        <div class="border-t border-white/10 px-6 py-4 text-xs leading-6 text-slate-400">
          Single-binary desk shell for Gogal Framework.
        </div>
      </aside>

      <div class="flex min-h-screen flex-1 flex-col">
        <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
          <div class="flex items-center justify-between gap-4 px-4 py-4 lg:px-8">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Workspace</p>
              <h2 class="text-lg font-semibold text-slate-900">Gogal Studio Shell</h2>
            </div>
            <div class="inline-flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500">
              <span class="htmx-indicator items-center gap-2 text-sky-600">
                <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-20"></circle>
                  <path d="M22 12a10 10 0 0 0-10-10" stroke="currentColor" stroke-width="4"></path>
                </svg>
                Loading
              </span>
              <span>HTMX active</span>
            </div>
          </div>
        </header>

        <main class="flex-1 px-4 py-6 lg:px-8">
          <div
            id="app-content"
            class="mx-auto max-w-7xl"
            hx-get="/desk/dashboard"
            hx-trigger="load"
            hx-target="this"
            hx-swap="innerHTML"
          >
            <div class="rounded-3xl border border-slate-200 bg-white p-6 text-sm text-slate-500 shadow-sm">
              Loading Gogal Studio…
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
{{ end }}
